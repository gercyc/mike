name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t homeserver:32081/mike-backend:latest ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://mike-api.camposdev.ind.br' }}" \
            -t homeserver:32081/mike-frontend:latest \
            ./frontend

      - name: Push backend image
        run: |
          docker push homeserver:32081/mike-backend:latest

      - name: Push frontend image
        run: |
          docker push homeserver:32081/mike-frontend:latest
